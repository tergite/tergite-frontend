---
services:
  tergite-redis:
    restart: "${SERVICE_RESTART:-no}"
    image: redis:${REDIS_VERSION:-8.4.0}
    logging:
      driver: ${LOGGING_DRIVER}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30

  mss:
    restart: "${SERVICE_RESTART:-no}"
    depends_on:
      tergite-redis:
        condition: service_healthy
    image: "${REGISTRY:-tergite}/tergite-mss:${MSS_VERSION:-v2025.12.0}"
    logging:
      driver: ${LOGGING_DRIVER}
    ports:
      - "${MSS_EXT_PORT:-8002}:${MSS_PORT:-80}"
    environment:
      - MSS_CONFIG_FILE=/code/mss-config.toml
      - PRIVATE_KEY_FILE=/code/private-mss-key.pem
    volumes:
      - ./mss-config.toml:/code/mss-config.toml:ro
      - ./private-mss-key.pem:/code/private-mss-key.pem:ro
      - ./bcc_certs:/code/bcc_certs:ro
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -qO- --server-response --tries=1 --quiet http://mss:${MSS_PORT:-80}/devices/ 2>&1 | grep -q "HTTP/1.1 200" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  dashboard:
    restart: "${SERVICE_RESTART:-no}"
    depends_on:
      mss:
        condition: service_healthy
    image: "${REGISTRY:-tergite}/tergite-dashboard:${DASHBOARD_VERSION:-v2025.12.0}"
    environment:
      # pick COOKIE_DOMAIN, COOKIE_NAME from the environment file
      - API_BASE_URL=${MSS_URL}
    logging:
      driver: ${LOGGING_DRIVER}
    ports:
      - "${DASHBOARD_EXT_PORT:-3000}:80"
    env_file:
      - .env

  grafana-alloy:
    restart: "${SERVICE_RESTART:-unless-stopped}"
    image: grafana/alloy:${GRAFANA_ALLOY_VERSION:-v1.13.2}
    logging:
      driver: ${LOGGING_DRIVER}
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.data/alloy:/var/lib/alloy/data
    command: ["run", "--storage.path=/var/lib/alloy/data", "/etc/alloy/config.alloy"]
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:12345/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
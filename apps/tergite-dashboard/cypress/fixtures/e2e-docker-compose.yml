---
services:
  mss:
    depends_on:
      - tergite-mongo
    networks:
      - tergite-frontend-e2e
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-L",
          "-H",
          "Authorization: Bearer ${MSS_APP_TOKEN}",
          "-f",
          "-X",
          "PUT",
          "http://localhost:8002/devices/dummy",
          "-d",
          '{"name": "dummy"}',
        ]

  dashboard:
    networks:
      - tergite-frontend-e2e
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/login"]

  tergite-mongo:
    restart: always
    image: "tergite/tergite-mongo-e2e:latest"
    build:
      context: ./
      dockerfile: mongo.Dockerfile
    logging:
      driver: ${LOGGING_DRIVER}
    ports:
      - "27018:27017"
      - "3001:3001"
    networks:
      - tergite-frontend-e2e
    env_file:
      - .env
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh mongodb://localhost:27018/ --quiet
      interval: 30s
      timeout: 10s
      retries: 5

  tergite-redis:
    restart: always
    image: redis
    logging:
      driver: ${LOGGING_DRIVER}
    ports:
      - "6378:6379"
    networks:
      - tergite-frontend-e2e
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30

  qiskit_pulse_1q:
    restart: always
    depends_on:
      - mss
      - tergite-redis
    image: "tergite/tergite-backend-e2e:latest"
    build:
      context: ../tergite-backend
      dockerfile: Dockerfile
    logging:
      driver: ${LOGGING_DRIVER}
    ports:
      - "8001:8000"
    environment:
      MSS_MACHINE_ROOT_URL: "http://mss:8002"
      MSS_PORT: 8002
      BCC_MACHINE_ROOT_URL: "http://localhost:8001"
      BCC_PORT: 8000
      EXECUTOR_TYPE: "qiskit_pulse_1q"
      DEFAULT_PREFIX: "qiskit_pulse_1q"
      MSS_APP_TOKEN: ${MSS_APP_TOKEN}
      APP_SETTINGS: "production"
      IS_AUTH_ENABLED: "True"
      REDIS_PORT: 6379
      REDIS_HOST: "tergite-redis"
      JWT_SECRET: "dd94de9017e976973769aaf5d426fdb95cab46feda584dbdbc5f3f02bbf8ae8ce77211d7"
      CORS_ORIGINS: "127.0.0.1,localhost"
    volumes:
      - ./.env/:/code/.env:ro
      - ./qiskit_pulse_1q.toml/:/code/backend_config.toml:ro
      - ./qiskit_pulse_1q.seed.toml/:/code/calibration.seed.toml:ro
      - ./public-mss-key.pem/:/code/public-mss-key.pem:ro
      - ./qiskit_pulse_1q_booking_db.db/:/code/booking_db.db:ro
    networks:
      - tergite-frontend-e2e
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]

  qiskit_pulse_2q:
    restart: always
    depends_on:
      - qiskit_pulse_1q
      - mss
      - tergite-redis
    image: "tergite/tergite-backend-e2e:latest"
    logging:
      driver: ${LOGGING_DRIVER}
    ports:
      - "8000:8000"
    environment:
      MSS_MACHINE_ROOT_URL: "http://mss:8002"
      MSS_PORT: 8002
      BCC_MACHINE_ROOT_URL: "http://localhost:8000"
      BCC_PORT: 8000
      EXECUTOR_TYPE: "qiskit_pulse_2q"
      DEFAULT_PREFIX: "qiskit_pulse_2q"
      MSS_APP_TOKEN: ${MSS_APP_TOKEN}
      APP_SETTINGS: "production"
      IS_AUTH_ENABLED: "True"
      REDIS_PORT: 6379
      REDIS_HOST: "tergite-redis"
      JWT_SECRET: "e9fae9efa7c3ff10348acde323baa5273db8021712ecb1f59fdf0e8336240fb7d70c6d8d"
      CORS_ORIGINS: "127.0.0.1,localhost"
    volumes:
      - ./.env/:/code/.env:ro
      - ./qiskit_pulse_2q.toml/:/code/backend_config.toml:ro
      - ./qiskit_pulse_2q.seed.toml/:/code/calibration.seed.toml:ro
      - ./public-mss-key.pem/:/code/public-mss-key.pem:ro
      - ./qiskit_pulse_2q_booking_db.db/:/code/booking_db.db:ro

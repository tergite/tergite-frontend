---
services:
  mss:
    depends_on:
      tergite-mongo:
        condition: service_healthy
    networks:
      - tergite-frontend-e2e
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget --header="Authorization: Bearer $MSS_APP_TOKEN" --quiet --tries=1 --spider http://mss:8002/jobs || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  dashboard:
    depends_on:
      mss:
        condition: service_healthy
    networks:
      - tergite-frontend-e2e
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:3000/login"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # FIXME: the init script for mongo fails when condition: service_healthy is ised
  #  for dependencies of mongodb or mss
  tergite-mongo:
    restart: always
    image: "tergite/tergite-mongo-e2e:latest"
    build:
      context: ./
      dockerfile: mongo.Dockerfile
    logging:
      driver: ${LOGGING_DRIVER}
    ports:
      - "27018:27017"
      - "3001:3001"
    networks:
      - tergite-frontend-e2e
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo-init:
    # throw-away service to initialize tergite-mongo since having health check
    # and initialization scripts for mongo causes unexpected errors
    image: mongo:latest
    depends_on:
      tergite-mongo:
        condition: service_healthy
    command: >
      bash -c 'mongosh --host tergite-mongo /scripts/init.js'
    volumes:
      - ./mongo-init.js:/scripts/init.js:ro
    networks:
      - tergite-frontend-e2e

  tergite-redis:
    restart: always
    image: redis
    logging:
      driver: ${LOGGING_DRIVER}
    ports:
      - "6378:6379"
    networks:
      - tergite-frontend-e2e
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30

  qiskit_pulse_1q:
    restart: always
    depends_on:
      mss:
        condition: service_healthy
      tergite-redis:
        condition: service_healthy
    image: "tergite/tergite-backend-e2e:latest"
    build:
      context: ../tergite-backend
      dockerfile: Dockerfile
    logging:
      driver: ${LOGGING_DRIVER}
    ports:
      - "8001:8000"
    environment:
      MSS_MACHINE_ROOT_URL: "http://mss:8002"
      MSS_PORT: 8002
      BCC_MACHINE_ROOT_URL: "http://localhost:8001"
      BCC_PORT: 8000
      EXECUTOR_TYPE: "qiskit_pulse_1q"
      DEFAULT_PREFIX: "qiskit_pulse_1q"
      MSS_APP_TOKEN: ${MSS_APP_TOKEN}
      APP_SETTINGS: "production"
      IS_AUTH_ENABLED: "True"
      REDIS_PORT: 6379
      REDIS_HOST: "tergite-redis"
      JWT_SECRET: "dd94de9017e976973769aaf5d426fdb95cab46feda584dbdbc5f3f02bbf8ae8ce77211d7"
      CORS_ORIGINS: "127.0.0.1,localhost"
    volumes:
      - ./.env/:/code/.env:ro
      - ./qiskit_pulse_1q.toml/:/code/backend_config.toml:ro
      - ./qiskit_pulse_1q.seed.toml/:/code/calibration.seed.toml:ro
      - ./public-mss-key.pem/:/code/public-mss-key.pem:ro
      - ./qiskit_pulse_1q_booking_db.db/:/code/booking_db.db:ro
    networks:
      - tergite-frontend-e2e
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  qiskit_pulse_2q:
    restart: always
    depends_on:
      qiskit_pulse_1q:
        condition: service_healthy
      mss:
        condition: service_healthy
      tergite-redis:
        condition: service_healthy
    image: "tergite/tergite-backend-e2e:latest"
    logging:
      driver: ${LOGGING_DRIVER}
    ports:
      - "8000:8000"
    environment:
      MSS_MACHINE_ROOT_URL: "http://mss:8002"
      MSS_PORT: 8002
      BCC_MACHINE_ROOT_URL: "http://localhost:8000"
      BCC_PORT: 8000
      EXECUTOR_TYPE: "qiskit_pulse_2q"
      DEFAULT_PREFIX: "qiskit_pulse_2q"
      MSS_APP_TOKEN: ${MSS_APP_TOKEN}
      APP_SETTINGS: "production"
      IS_AUTH_ENABLED: "True"
      REDIS_PORT: 6379
      REDIS_HOST: "tergite-redis"
      JWT_SECRET: "e9fae9efa7c3ff10348acde323baa5273db8021712ecb1f59fdf0e8336240fb7d70c6d8d"
      CORS_ORIGINS: "127.0.0.1,localhost"
    volumes:
      - ./.env/:/code/.env:ro
      - ./qiskit_pulse_2q.toml/:/code/backend_config.toml:ro
      - ./qiskit_pulse_2q.seed.toml/:/code/calibration.seed.toml:ro
      - ./public-mss-key.pem/:/code/public-mss-key.pem:ro
      - ./qiskit_pulse_2q_booking_db.db/:/code/booking_db.db:ro
    networks:

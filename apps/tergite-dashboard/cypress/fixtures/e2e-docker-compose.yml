      MSS_PORT: 8002
      BCC_MACHINE_ROOT_URL: "http://localhost:8000"
      BCC_PORT: 8000
      EXECUTOR_TYPE: "quantify"
      DEFAULT_PREFIX: "loke"
      MAX_TIME_SLOT_LENGTH: 7200
      MIN_TIME_SLOT_LENGTH: 1200
      MAX_SLOTS_PER_DAY: 20
      MAX_IDLE_TIME: 100
      APP_SETTINGS: "staging"
      CURRENT_DATE: "2025-10-01T00:00:00.000Z"
      IS_AUTH_ENABLED: "True"

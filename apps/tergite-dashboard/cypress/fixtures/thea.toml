[general_config]
# general static configuration for the backend
name = "Thea"
is_active = true
characterized = true
open_pulse = true
simulator = false
version = "2023.06.0"
num_qubits = 5
num_couplers = 5
num_resonators = 5
description = "5 qubit device"
dt = 1e-9
dtm = 1e-9

[device_config]
# config names for specification of calibration values
# probably not entirely true for everything herein but mostly so
discriminators = [ "lda"]

qubit_ids = ["q0", "q1", "q2", "q3", "q4"]

coordinates = [
      [1, 1],
      [3, 1],
      [1, 2],
      [2, 2],
      [3, 2]
    ]

meas_map = [[0, 1, 2, 3, 4]]

qubit_parameters = [
  "id",
  "x_position",
  "y_position",
  "xy_drive_line",
  "z_drive_line",
  "frequency",
  "pi_pulse_amplitude",
  "pi_pulse_duration",
  "pulse_type",
  "pulse_sigma",
  "t1_decoherence",
  "t2_decoherence"
]
resonator_parameters = [
  "id",
  "x_position",
  "y_position",
  "readout_line",
  "acq_delay",
  "acq_integration_time",
  "frequency",
  "pulse_delay",
  "pulse_duration",
  "pulse_type",
  "pulse_amplitude"
]

coupler_parameters = [
  "id",
  "frequency",
  "frequency_detuning",
  "anharmonicity",
  "coupling_strength_02",
  "coupling_strength_12",
  "cz_pulse_amplitude",
  "cz_pulse_dc_bias",
  "cz_pulse_phase_offset",
  "cz_pulse_duration_before",
  "cz_pulse_duration_rise",
  "cz_pulse_duration_constant",
  "control_rz_lambda",
  "target_rz_lambda",
  "pulse_type"
]

[device_config.coupling_dict]
u0 = ["q0", "q1"]
u1 = ["q0", "q2"]
u2 = ["q2", "q3"]
u3 = ["q1", "q4"]
u4 = ["q3", "q4"]


[device_config.discriminator_parameters]
lda = [
  "coef_0",
  "coef_1",
  "intercept"
]

[gates.u]
qubits = [ 0 ]
qasm_def = "gate id q { U(0, 0, 0) q; }"
parameters = [ ]

[gates.h]
qubits = [ 0 ]
qasm_def = "gate id q { U(0, 0, 0) q; }"
parameters = [ ]

[gates.x]
qubits = [ 0 ]
qasm_def = "gate id q { U(0, 0, 0) q; }"
parameters = [ ]

